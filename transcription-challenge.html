const AUDIO_BASE_URL = "https://cdn.jsdelivr.net/gh/remoandfriends/spanish-trainer-audio@main";

/* ===== Scoring ===== */
function normalizeSpanish(str) {
  return (str || "").toLowerCase().replace(/[¿?¡!.,;:"]/g, "").replace(/\s+/g, " ").trim();
}
function levenshtein(a, b) {
  if (a === b) return 0;
  if (!a.length) return b.length;
  if (!b.length) return a.length;
  const dp = Array.from({ length: a.length + 1 }, () => new Array(b.length + 1).fill(0));
  for (let i = 0; i <= a.length; i++) dp[i][0] = i;
  for (let j = 0; j <= b.length; j++) dp[0][j] = j;
  for (let i = 1; i <= a.length; i++) {
    for (let j = 1; j <= b.length; j++) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      dp[i][j] = Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+cost);
    }
  }
  return dp[a.length][b.length];
}
function gradeSpanish(userInput, target) {
  const u = normalizeSpanish(userInput), t = normalizeSpanish(target);
  if (!u) return 0;
  if (u === t) return 100;
  const dist = levenshtein(u, t);
  return Math.max(0, Math.round((1 - dist / Math.max(u.length, t.length)) * 100));
}
const STOPWORDS = new Set(["the","a","an","is","are","was","were","to","of","in","on","at","and","or","but","i","you","he","she","it","we","they","my","your","his","her","our","their","this","that","do","does","did","have","has","had","be","been","for","with","as","so"]);
function gradeEnglish(userInput, reference) {
  if (!userInput || !userInput.trim()) return { score: 0, feedback: "No translation provided." };
  const tokenize = (s) => (s || "").toLowerCase().replace(/[^\w\s']/g, " ").split(/\s+/).filter(Boolean);
  const u = new Set(tokenize(userInput).filter(w => !STOPWORDS.has(w)));
  const r = tokenize(reference).filter(w => !STOPWORDS.has(w));
  if (!r.length || !u.size) return { score: 0, feedback: "Empty input." };
  let hits = 0;
  for (const w of r) if (u.has(w)) hits++;
  const score = Math.round((hits / r.length) * 100);
  return { score, feedback: score >= 70 ? "Good keyword match" : "Some key meaning words missing" };
}

/* ===== UI helpers ===== */
function scoreColor(p) {
  if (p >= 70) return "#2F7D3F";
  if (p >= 50) return "#1F4E8C";
  if (p >= 30) return "#5A2E7A";
  if (p >= 15) return "#B25A0E";
  return "#A02020";
}
function motivationalMessage(combined, sp, en) {
  if (combined === 100) return "¡Perfecto! Native-speaker level on this one. 🔥";
  if (combined >= 90)  return "Crushed it. Tiny imperfections at most — that's elite work.";
  if (combined >= 80)  return "Strong. You understood it cleanly and translated naturally.";
  if (combined >= 70)  return "Solid! You got the meaning and most of the words. Onward.";
  if (combined >= 60) {
    if (sp >= en + 15) return `Sooooo close! Spanish is tight (${sp}%), English needs another pass.`;
    if (en >= sp + 15) return `Sooooo close! Meaning is clicking (${en}%), but Spanish transcription has gaps.`;
    return "Sooooo close! You're almost there.";
  }
  if (combined >= 50)  return "Halfway there. Listen again with fresh ears.";
  if (combined >= 30)  return "You caught fragments but missed the big picture. Try the slow-tempo hint.";
  if (combined >= 15)  return "Rough one. Don't sweat it — natives talk fast. Use both hints and try again.";
  if (combined > 0)    return "Geez, way off. Keep at it, you'll need more reps.";
  return "Did you press play? 😅 No worries, dust off and retry.";
}

/* ===== Progress (localStorage) ===== */
function useProgress() {
  const [progress, setProgress] = useState({ passedIds: [], maxTier: 1 });
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    try {
      const raw = localStorage.getItem("spanish_trainer_progress");
      if (raw) {
        const v = JSON.parse(raw);
        setProgress({ passedIds: v.passedIds || [], maxTier: v.maxTier || 1 });
      }
    } catch (_) {}
    setLoaded(true);
  }, []);

  const markPassed = useCallback((phraseId, tier) => {
    setProgress(prev => {
      const passedIds = prev.passedIds.includes(phraseId) ? prev.passedIds : [...prev.passedIds, phraseId];
      const tierIds = PHRASES.filter(p => p.tier === tier).map(p => p.id);
      const allPassed = tierIds.every(id => passedIds.includes(id));
      const maxTier = allPassed ? Math.max(prev.maxTier, tier + 1) : prev.maxTier;
      const next = { passedIds, maxTier: Math.min(maxTier, 5) };
      try { localStorage.setItem("spanish_trainer_progress", JSON.stringify(next)); } catch (_) {}
      return next;
    });
  }, []);

  const reset = useCallback(() => {
    setProgress({ passedIds: [], maxTier: 1 });
    try { localStorage.removeItem("spanish_trainer_progress"); } catch (_) {}
  }, []);

  return { progress, loaded, markPassed, reset };
}

/* ===== Audio (direct <audio> works in normal browser, no iframe restrictions) ===== */
function useSpeech(phraseId) {
  const audioRef = useRef(null);
  const [status, setStatus] = useState("idle");
  const url = `${AUDIO_BASE_URL}/${phraseId}.mp3`;

  useEffect(() => {
    setStatus("idle");
  }, [phraseId]);

  const speak = useCallback((opts = {}) => {
    const audio = audioRef.current;
    if (!audio) return;
    audio.pause();
    audio.currentTime = 0;
    audio.playbackRate = opts.slow ? 0.6 : 1.0;
    setStatus("loading");
    audio.play().then(() => setStatus("playing")).catch(err => {
      console.error("Play failed:", err);
      setStatus("error");
    });
  }, []);

  const stop = useCallback(() => {
    if (audioRef.current) {
      audioRef.current.pause();
      audioRef.current.currentTime = 0;
    }
    setStatus("idle");
  }, []);

  const audioElement = (
    <audio
      ref={audioRef}
      src={url}
      preload="auto"
      onEnded={() => setStatus("idle")}
      onError={() => setStatus("error")}
      style={{ display: "none" }}
    />
  );

  return { speak, stop, status, audioElement };
}

/* ===== Accent bar ===== */
const ACCENT_KEYS = ["á","é","í","ó","ú","ü","ñ","Á","É","Í","Ó","Ú","Ñ","¿","?","¡","!"];
function AccentBar({ targetRef, value, onChange }) {
  const insert = (ch) => {
    const el = targetRef.current;
    if (!el) { onChange((value || "") + ch); return; }
    const start = el.selectionStart ?? value.length;
    const end = el.selectionEnd ?? value.length;
    const next = (value || "").slice(0, start) + ch + (value || "").slice(end);
    onChange(next);
    requestAnimationFrame(() => {
      el.focus();
      el.selectionStart = el.selectionEnd = start + ch.length;
    });
  };
  return (
    <div className="flex flex-wrap gap-1.5 mt-2">
      {ACCENT_KEYS.map(k => (
        <button key={k} type="button" onClick={() => insert(k)}
          className="px-2.5 py-1 rounded-md text-sm border transition"
          style={{ background: "#FAF5EC", borderColor: "#1A1814", color: "#1A1814", fontFamily: "'Fraunces', serif", fontWeight: 500 }}>
          {k}
        </button>
      ))}
    </div>
  );
}

function PhrasePicker({ tier, progress, onPickPhrase, onBack }) {
  const tierPhrases = PHRASES.filter(p => p.tier === tier);
  const passedSet = new Set(progress.passedIds);
  let firstUnpassedIdx = tierPhrases.findIndex(p => !passedSet.has(p.id));
  if (firstUnpassedIdx === -1) firstUnpassedIdx = tierPhrases.length - 1;
  return (
    <div className="max-w-3xl mx-auto px-6 py-8">
      <button onClick={onBack} className="text-xs uppercase tracking-[0.2em] mb-4 hover:opacity-60" style={{ color: "#807466" }}>← All tiers</button>
      <h2 className="text-4xl md:text-5xl mb-1" style={{ fontFamily: "'Fraunces', serif", fontWeight: 500, fontStyle: "italic", color: "#1A1814" }}>{TIER_NAMES[tier-1].name}</h2>
      <div className="text-sm mb-8" style={{ color: "#807466" }}>Tier 0{tier} · {TIER_NAMES[tier-1].desc}</div>
      <div className="grid grid-cols-5 gap-2">
        {tierPhrases.map((p, i) => {
          const passed = passedSet.has(p.id);
          const unlocked = passed || i <= firstUnpassedIdx;
          return (
            <button key={p.id} disabled={!unlocked} onClick={() => unlocked && onPickPhrase(p)}
              className="aspect-square rounded-md flex flex-col items-center justify-center transition"
              style={{ background: passed ? "#2F7D3F" : unlocked ? "#FAF5EC" : "#E8E2D3", border: `2px solid ${passed ? "#2F7D3F" : unlocked ? "#1A1814" : "#9E978A"}`, color: passed ? "#FAF5EC" : unlocked ? "#1A1814" : "#9E978A", cursor: unlocked ? "pointer" : "not-allowed", opacity: unlocked ? 1 : 0.5 }}>
              <div className="text-2xl tabular-nums" style={{ fontFamily: "'Fraunces', serif", fontWeight: 500 }}>{i + 1}</div>
              {passed && <div className="text-xs">✓</div>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ===== Phrase screen ===== */
function PhraseScreen({ phrase, tier, indexInTier, totalInTier, timerLimit, onPass, onBack, onNext, hasNext }) {
  const speech = useSpeech(phrase.id);
  const spanishRef = useRef(null);
  const [spanish, setSpanish] = useState("");
  const [english, setEnglish] = useState("");
  const [hint1Used, setHint1Used] = useState(false);
  const [hint2Used, setHint2Used] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [result, setResult] = useState(null);
  const [secondsLeft, setSecondsLeft] = useState(timerLimit);
  const timerRef = useRef(null);

  const reset = useCallback(() => {
    setSpanish(""); setEnglish("");
    setHint1Used(false); setHint2Used(false);
    setSubmitted(false); setResult(null);
    setSecondsLeft(timerLimit);
  }, [timerLimit]);

  useEffect(() => { reset(); }, [phrase.id, reset]);

  useEffect(() => {
    if (submitted) return;
    timerRef.current = setInterval(() => {
      setSecondsLeft(s => {
        if (s <= 1) { clearInterval(timerRef.current); handleSubmit(true); return 0; }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [submitted, phrase.id]);

  const handleSubmit = useCallback((autoDeducted = false) => {
    if (submitted) return;
    setSubmitted(true);
    speech.stop();
    if (timerRef.current) clearInterval(timerRef.current);
    let sp = gradeSpanish(spanish, phrase.s);
    const enResult = gradeEnglish(english, phrase.e);
    let en = enResult.score;
    if (autoDeducted) { sp = Math.max(0, sp - 10); en = Math.max(0, en - 10); }
    const combined = Math.round((sp + en) / 2);
    const passed = combined >= 70;
    setResult({ sp, en, combined, enFeedback: enResult.feedback, autoDeducted, passed });
    if (passed) onPass(phrase.id, tier);
  }, [submitted, spanish, english, phrase, tier, speech, onPass]);

  const mm = Math.floor(secondsLeft / 60);
  const ss = secondsLeft % 60;
  const timerColor = secondsLeft <= 30 ? "#C8553D" : "#1A1814";

  return (
    <div className="max-w-3xl mx-auto px-6 py-6">
      <div className="flex items-center justify-between mb-6">
        <button onClick={onBack} className="text-xs uppercase tracking-[0.2em] hover:opacity-60" style={{ color: "#807466" }}>← Phrase list</button>
        <div className="flex items-center gap-4">
          <div className="text-xs" style={{ color: "#807466" }}>Phrase {indexInTier+1} / {totalInTier}</div>
          {!submitted && (
            <div className="px-3 py-1 rounded text-sm tabular-nums" style={{ background: "#FAF5EC", border: `1px solid ${timerColor}`, color: timerColor, fontWeight: 600 }}>
              {String(mm).padStart(2,"0")}:{String(ss).padStart(2,"0")}
            </div>
          )}
        </div>
      </div>
      <h2 className="text-3xl md:text-4xl mb-1" style={{ fontFamily: "'Fraunces', serif", fontWeight: 500, fontStyle: "italic", color: "#1A1814" }}>
        {TIER_NAMES[tier-1].name} · Phrase {indexInTier+1}
      </h2>
      <div className="text-sm mb-6" style={{ color: "#807466" }}>Listen, transcribe, translate. Replay as many times as you want.</div>
      <div className="mb-6 p-6 rounded-lg flex flex-col items-center" style={{ background: "#1A1814", color: "#FAF5EC" }}>
        {speech.audioElement}
        <button onClick={() => speech.speak()} disabled={speech.status === "error"}
          className="w-20 h-20 rounded-full flex items-center justify-center transition hover:scale-105"
          style={{ background: "#C8553D", color: "#FAF5EC", opacity: speech.status === "error" ? 0.5 : 1 }} title="Play phrase">
          {speech.status === "loading" ? (
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3">
              <circle cx="12" cy="12" r="9" strokeDasharray="40 60" strokeLinecap="round">
                <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="1s" repeatCount="indefinite" />
              </circle>
            </svg>
          ) : speech.status === "playing" ? (
            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" /><rect x="14" y="5" width="4" height="14" /></svg>
          ) : (
            <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z" /></svg>
          )}
        </button>
        <div className="mt-3 text-xs opacity-70">
          {speech.status === "error" ? "Audio failed — check your internet connection" :
           speech.status === "loading" ? "Loading audio…" :
           speech.status === "playing" ? "Playing… (tap to restart)" :
           "Tap to play · Native voice, real-life tempo"}
        </div>
      </div>
      {!submitted && (
        <div className="flex gap-2 mb-6">
          <button disabled={hint1Used} onClick={() => setHint1Used(true)}
            className="flex-1 px-3 py-2 rounded text-sm text-left transition"
            style={{ background: hint1Used ? "#F2EADA" : "#FAF5EC", border: "1px solid #1A1814", color: "#1A1814", opacity: hint1Used ? 0.95 : 1 }}>
            <div className="text-xs uppercase tracking-wider mb-0.5" style={{ color: "#807466" }}>Hint 1 · Topic</div>
            <div>{hint1Used ? phrase.topic : "Reveal what the phrase is about"}</div>
          </button>
          <button disabled={hint2Used || speech.status === "error"}
            onClick={() => { setHint2Used(true); speech.speak({ slow: true }); }}
            className="flex-1 px-3 py-2 rounded text-sm text-left transition"
            style={{ background: "#FAF5EC", border: "1px solid #1A1814", color: "#1A1814", opacity: hint2Used ? 0.6 : 1 }}>
            <div className="text-xs uppercase tracking-wider mb-0.5" style={{ color: "#807466" }}>Hint 2 · Slow audio</div>
            <div>{hint2Used ? "Played at slow tempo" : "Play once at slow speed"}</div>
          </button>
        </div>
      )}
      {!submitted && (
        <div className="space-y-4 mb-6">
          <div>
            <label className="text-xs uppercase tracking-[0.2em] block mb-1" style={{ color: "#807466" }}>
              Spanish transcription <span style={{ color: "#C8553D" }}>(strict — match exactly)</span>
            </label>
            <textarea ref={spanishRef} value={spanish} onChange={(e) => setSpanish(e.target.value)}
              placeholder="Type what you hear, in Spanish..."
              className="w-full p-3 rounded-md text-base"
              style={{ background: "#FAF5EC", border: "1px solid #1A1814", color: "#1A1814", minHeight: "80px" }} />
            <AccentBar targetRef={spanishRef} value={spanish} onChange={setSpanish} />
          </div>
          <div>
            <label className="text-xs uppercase tracking-[0.2em] block mb-1" style={{ color: "#807466" }}>
              English translation <span style={{ color: "#2F7D3F" }}>(meaning matters, exact words don't)</span>
            </label>
            <textarea value={english} onChange={(e) => setEnglish(e.target.value)}
              placeholder="Translate the meaning into English..."
              className="w-full p-3 rounded-md text-base"
              style={{ background: "#FAF5EC", border: "1px solid #1A1814", color: "#1A1814", minHeight: "80px" }} />
          </div>
        </div>
      )}
      {!submitted && (
        <button onClick={() => handleSubmit(false)} className="w-full py-4 rounded-md text-lg transition hover:opacity-90"
          style={{ background: "#C8553D", color: "#FAF5EC", fontFamily: "'Fraunces', serif", fontWeight: 500, letterSpacing: "0.02em" }}>
          Submit answers
        </button>
      )}
      {submitted && result && (
        <ResultsView phrase={phrase} result={result} userSpanish={spanish} userEnglish={english} onRetry={reset} onNext={onNext} hasNext={hasNext} />
      )}
    </div>
  );
}

function ResultsView({ phrase, result, userSpanish, userEnglish, onRetry, onNext, hasNext }) {
  const { sp, en, combined, enFeedback, autoDeducted, passed } = result;
  return (
    <div className="space-y-5">
      {autoDeducted && (
        <div className="p-3 rounded-md text-sm" style={{ background: "#FAE6E0", border: "1px solid #C8553D", color: "#7A2A18" }}>
          Time ran out — 10 points deducted from each section.
        </div>
      )}
      <div className="grid grid-cols-3 gap-3">
        {[{label:"Spanish",val:sp},{label:"English",val:en},{label:"Combined",val:combined}].map(b => (
          <div key={b.label} className="p-4 rounded-md text-center" style={{ background: "#FAF5EC", border: `2px solid ${scoreColor(b.val)}` }}>
            <div className="text-xs uppercase tracking-wider mb-1" style={{ color: "#807466" }}>{b.label}</div>
            <div className="text-4xl tabular-nums" style={{ color: scoreColor(b.val), fontFamily: "'Fraunces', serif", fontWeight: 600 }}>
              {b.val}<span className="text-xl">%</span>
            </div>
          </div>
        ))}
      </div>
      <div className="p-4 rounded-md text-center" style={{ background: passed ? "#E8F1E5" : "#FAF5EC", border: `1px solid ${scoreColor(combined)}` }}>
        <div className="text-base" style={{ fontFamily: "'Fraunces', serif", fontStyle: "italic", color: scoreColor(combined) }}>
          {motivationalMessage(combined, sp, en)}
        </div>
        {enFeedback && <div className="text-xs mt-2" style={{ color: "#807466" }}>English feedback: {enFeedback}</div>}
      </div>
      {passed && (
        <div className="p-4 rounded-md" style={{ background: "#1A1814", color: "#FAF5EC" }}>
          <div className="text-xs uppercase tracking-[0.2em] mb-2 opacity-70">Correct answers</div>
          <div className="mb-2" style={{ fontFamily: "'Fraunces', serif", fontStyle: "italic", fontSize: "1.1rem" }}>🇪🇸 {phrase.s}</div>
          <div style={{ opacity: 0.85 }}>🇺🇸 {phrase.e}</div>
        </div>
      )}
      <details className="text-sm" style={{ color: "#807466" }}>
        <summary className="cursor-pointer">Your answers</summary>
        <div className="mt-2 p-3 rounded" style={{ background: "#F2EADA", color: "#1A1814" }}>
          <div className="mb-1"><strong>Your Spanish:</strong> {userSpanish || <em>(blank)</em>}</div>
          <div><strong>Your English:</strong> {userEnglish || <em>(blank)</em>}</div>
          {!passed && (
            <div className="mt-3 pt-3 border-t" style={{ borderColor: "#1A1814" }}>
              <div className="mb-1"><strong>Should have been (ES):</strong> {phrase.s}</div>
              <div><strong>Reference (EN):</strong> {phrase.e}</div>
            </div>
          )}
        </div>
      </details>
      <div className="flex gap-3">
        <button onClick={onRetry} className="flex-1 py-3 rounded-md transition hover:opacity-90"
          style={{ background: "transparent", border: "2px solid #1A1814", color: "#1A1814", fontFamily: "'Fraunces', serif", fontWeight: 500 }}>
          {passed ? "Retry for 100%" : "Retry"}
        </button>
        {passed && hasNext && (
          <button onClick={onNext} className="flex-1 py-3 rounded-md transition hover:opacity-90"
            style={{ background: "#2F7D3F", color: "#FAF5EC", fontFamily: "'Fraunces', serif", fontWeight: 500 }}>
            Next phrase →
          </button>
        )}
        {passed && !hasNext && (
          <button onClick={onNext} className="flex-1 py-3 rounded-md transition hover:opacity-90"
            style={{ background: "#C99846", color: "#1A1814", fontFamily: "'Fraunces', serif", fontWeight: 500 }}>
            🎉 Tier complete!
          </button>
        )}
      </div>
    </div>
  );
}

/* =========================================================================
   BRAND — Lingo Harmony wordmark on the left, custom LH monogram on the right.
   The monogram is drawn as a single continuous flow: the L's stem rises into
   a soft curve that becomes the H's crossbar — two letters joined like two
   languages in conversation. Slight hand-drawn imperfection (no perfect
   geometry) keeps it feeling literary rather than corporate.
   ========================================================================= */
function LingoHarmonyLogo({ size = 44 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-label="Lingo Harmony logo">
      {/* Soft cream disc background with hand-drawn edge feel */}
      <circle cx="32" cy="32" r="30" fill="#1A1814" />
      <circle cx="32" cy="32" r="28" fill="none" stroke="#FAF5EC" strokeWidth="0.6" opacity="0.25" />

      {/* The LH ligature — drawn with one main brushstroke + connector arc */}
      <g stroke="#FAF5EC" strokeWidth="3.2" strokeLinecap="round" strokeLinejoin="round" fill="none">
        {/* L vertical stem (slight rightward lean for handwriting feel) */}
        <path d="M 18 16 Q 17.5 33, 18.5 47" />
        {/* L base stroke */}
        <path d="M 18.5 47 L 28 47" />

        {/* H left vertical */}
        <path d="M 36 17 Q 36.2 33, 36 49" />
        {/* H right vertical */}
        <path d="M 48 17 Q 48.2 33, 48 49" />
      </g>

      {/* The connecting "harmony" arc — clay red — links the L's tail to the H's crossbar */}
      <path
        d="M 28 47 Q 33 38, 36 32 L 48 32"
        stroke="#C8553D"
        strokeWidth="2.6"
        strokeLinecap="round"
        fill="none"
      />

      {/* Small accent dot — a tilde / breath mark above, hinting at Spanish diacritics */}
      <path d="M 22 11 Q 25 9.5, 28 11" stroke="#C8553D" strokeWidth="1.6" strokeLinecap="round" fill="none" />
    </svg>
  );
}

function BrandBar({ onHomeClick }) {
  return (
    <div className="max-w-3xl mx-auto px-6 pt-6 pb-2 flex items-center justify-between">
      <button
        onClick={onHomeClick}
        className="flex items-baseline gap-1.5 hover:opacity-70 transition"
        title="Return to home"
        style={{ background: "transparent", border: "none", padding: 0, cursor: "pointer" }}
      >
        <span style={{
          fontFamily: "'Fraunces', serif",
          fontWeight: 500,
          fontStyle: "italic",
          fontSize: "1.5rem",
          color: "#1A1814",
          letterSpacing: "-0.01em"
        }}>
          Lingo
        </span>
        <span style={{
          fontFamily: "'Fraunces', serif",
          fontWeight: 500,
          fontStyle: "italic",
          fontSize: "1.5rem",
          color: "#C8553D",
          letterSpacing: "-0.01em"
        }}>
          Harmony
        </span>
      </button>
      <button
        onClick={onHomeClick}
        title="Return to home"
        style={{ background: "transparent", border: "none", padding: 0, cursor: "pointer", lineHeight: 0 }}
        className="hover:scale-105 transition"
      >
        <LingoHarmonyLogo size={44} />
      </button>
    </div>
  );
}

/* ===== App ===== */
function App() {
  const [view, setView] = useState({ name: "landing" });
  const [timerMode, setTimerMode] = useState(300);
  const { progress, loaded, markPassed, reset } = useProgress();

  if (!loaded) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ background: "#FAF5EC" }}>
        <div style={{ fontFamily: "'Fraunces', serif", fontStyle: "italic", color: "#807466" }}>Loading…</div>
      </div>
    );
  }

  const goLanding = () => setView({ name: "landing" });
  const goTier = (tier) => setView({ name: "picker", tier });
  const goPhrase = (phrase) => setView({ name: "phrase", phrase, tier: phrase.tier });
  const tierPhrases = view.tier ? PHRASES.filter(p => p.tier === view.tier) : [];
  const currentIdx = view.phrase ? tierPhrases.findIndex(p => p.id === view.phrase.id) : -1;
  const nextPhrase = currentIdx >= 0 && currentIdx < tierPhrases.length - 1 ? tierPhrases[currentIdx + 1] : null;

  return (
    <div className="min-h-screen" style={{ background: "#FAF5EC" }}>
      <BrandBar onHomeClick={goLanding} />
      {view.name === "landing" && <LandingPage progress={progress} onSelectTier={goTier} timerMode={timerMode} setTimerMode={setTimerMode} onReset={reset} />}
      {view.name === "picker" && <PhrasePicker tier={view.tier} progress={progress} onPickPhrase={goPhrase} onBack={goLanding} />}
      {view.name === "phrase" && (
        <PhraseScreen key={view.phrase.id} phrase={view.phrase} tier={view.tier} indexInTier={currentIdx} totalInTier={tierPhrases.length}
          timerLimit={timerMode} onPass={markPassed} onBack={() => goTier(view.tier)}
          onNext={() => { if (nextPhrase) goPhrase(nextPhrase); else goTier(view.tier); }} hasNext={!!nextPhrase} />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
